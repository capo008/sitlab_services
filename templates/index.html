<!DOCTYPE html>
<html data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <title>Servizi Sitlab</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color .3s, color .3s;
        }

        .service-card {
            transition: transform .25s ease, box-shadow .25s ease;
            border-radius: 14px;
        }

        .service-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }

        .theme-toggle {
            cursor: pointer;
            font-size: 1.4rem;
        }
    </style>
</head>

<body class="container py-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="fw-bold">Servizi Sitlab</h1>
        <h5 class="fw-bold">Clicca sul servizio che ti interessa per sapere come usarlo !</h5>

        <span class="theme-toggle" id="themeToggle">🌙</span>
    </div>

    <!-- Grid -->
    <div class="row g-4">
        {% for service_name, image_url in services_with_images %}
        <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <a href="/service/{{ service_name }}" class="text-decoration-none text-dark">
                <div class="card shadow-sm service-card overflow-hidden text-center">
                    {% if image_url %}
                    <img src="{{ image_url }}" alt="{{ service_name }}" class="card-img-top" style="height: 200px; object-fit: cover;">
                    {% endif %}
                    <div class="card-body p-3">
                        <h5 class="fw-semibold">{{ service_name }}</h5>
                    </div>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>

    <script>
        // Theme toggle
        const html = document.documentElement;
        const toggle = document.getElementById("themeToggle");

        function setTheme(theme) {
            html.setAttribute("data-bs-theme", theme);
            localStorage.setItem("theme", theme);
            toggle.textContent = theme === "light" ? "🌙" : "☀️";
        }

        // Load saved theme
        const saved = localStorage.getItem("theme") || "light";
        setTheme(saved);

        toggle.addEventListener("click", () => {
            const newTheme = html.getAttribute("data-bs-theme") === "light" ? "dark" : "light";
            setTheme(newTheme);
        });
    </script>

</body>
</html>
